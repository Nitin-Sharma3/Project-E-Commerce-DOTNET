<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Razorpay .NET 8 Sample</title>
</head>
<body>
  <button id="rzp-button1">Pay with Razorpay</button>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const API_BASE = "https://localhost:7000/api";

    document.getElementById("rzp-button1").onclick = async function (e) {
      e.preventDefault();

      // 1. Create order via the .NET 8 API
      const orderRes = await fetch(`${API_BASE}/payment/create-order`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount: 100, currency: "INR", receipt: "12121" })
      });
      const { orderId } = await orderRes.json();

      // 2. Open Razorpay checkout
      const options = {
        name: "DJ Tiesto",
        description: "Tron Legacy",
        order_id: orderId,
        image: "https://s29.postimg.org/r6dj1g85z/daft_punk.jpg",
        prefill: { name: "Daft Punk", email: "customer@merchant.com" },
        notes: { address: "Hello World", merchant_order_id: "12312321" },
        theme: { color: "#F37254", image_padding: false },
        modal: { escape: true, backdropclose: false,
                 ondismiss: () => console.log("Popup closed") },
        handler: async function (response) {
          // 3. Verify signature via the .NET 8 API
          const chargeRes = await fetch(`${API_BASE}/charge/verify`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              razorpayPaymentId: response.razorpay_payment_id,
              razorpayOrderId:   orderId,
              razorpaySignature: response.razorpay_signature
            })
          });
          const result = await chargeRes.json();
          if (chargeRes.ok) {
            alert("Payment successful! Payment ID: " + result.paymentId);
          } else {
            alert("Payment verification failed: " + result.error);
          }
        }
      };

      new Razorpay(options).open();
    };
  </script>
</body>
</html>
